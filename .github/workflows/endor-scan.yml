name: Endor Labs Scan

# Triggers on pull requests and on merges to the default branch.
# Replace 'main' with your default branch name if different (e.g. 'master').
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Full scan on merge to main ─────────────────────────────────────────────
  # Runs after every merge so the platform reflects the latest baseline.
  # Set ENDOR_NAMESPACE as a repository variable under
  # Settings > Secrets and variables > Actions > Variables.
  full-scan:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read         # Checkout code
      id-token: write        # Keyless auth to Endor Labs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Remove or replace this step if your project uses a different build tool.
      - name: Install dependencies
        run: npm install

      - name: Endor Labs scan
        uses: endorlabs/github-action@v1
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          pr: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── PR scan with triage comment ────────────────────────────────────────────
  # Runs on pull requests, posts the standard Endor Labs findings comment,
  # and then posts an interactive triage comment with numbered findings.
  # Also set ENDOR_PROJECT_UUID as a repository variable.
  pr-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # Post triage comment
      contents: read         # Checkout code
      id-token: write        # Keyless auth to Endor Labs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Remove or replace this step if your project uses a different build tool.
      - name: Install dependencies
        run: npm install

      - name: Endor Labs scan
        uses: endorlabs/github-action@v1
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Installs endorctl so the triage comment script can call the API.
      - name: Install endorctl
        run: |
          curl -fsSL https://api.endorlabs.com/download/latest/endorctl_linux_amd64 -o endorctl
          chmod +x endorctl
          sudo mv endorctl /usr/local/bin/endorctl

      # Posts the interactive triage comment with the numbered findings table.
      - name: Post triage comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}
          ENDOR_PROJECT_UUID: ${{ vars.ENDOR_PROJECT_UUID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 scripts/post_triage_comment.py
